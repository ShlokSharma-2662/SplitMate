name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (warnings as errors)
        run: dotnet build --no-restore --configuration Release /warnaserror

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  deploy:
    # Deploy only after build+test pass, and only on push to main (never on PRs).
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Web Deploy (simply-web-deploy) shells out to msdeploy.exe, which only
    # exists on Windows runners — must NOT be ubuntu-latest.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Publish framework-dependent/portable (no RID). This generates a
      # bitness-agnostic web.config (processPath="dotnet") so the in-process
      # AspNetCoreModule loads whichever coreclr matches the IIS app pool —
      # avoiding the "failed to load coreclr" 32/64-bit mismatch that a
      # self-contained win-x86 build caused. Relies on the .NET 10 runtime
      # installed on MonsterASP. Output ./publish is simply-web-deploy's default.
      - name: Publish
        run: dotnet publish src/SplitMate.Web/SplitMate.Web.csproj --configuration Release --output ./publish

      # Inject the production connection string from a secret into the publish
      # output. Lives only in GitHub Secrets (never in git), and is re-written on
      # every deploy so a deploy can never wipe it. ConvertTo-Json escapes safely.
      - name: Write production connection string
        shell: pwsh
        env:
          DEFAULT_CONNECTION: ${{ secrets.DEFAULT_CONNECTION }}
        run: |
          $config = @{ ConnectionStrings = @{ DefaultConnection = $env:DEFAULT_CONNECTION } }
          $config | ConvertTo-Json -Depth 3 | Set-Content -Path ./publish/appsettings.Production.json -Encoding utf8

      - name: Deploy to MonsterASP (Web Deploy)
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          # Remove files at the destination that aren't in this publish, so stale
          # artifacts from the previous self-contained deploy can't linger.
          target-delete: 'true'
